name: Repro Homebrew Render

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "home/Brewfile.tmpl"
      - "home/.chezmoidata/brew/**"
      - "home/.chezmoiscripts/run_onchange_after_bootstrap.sh.tmpl"
      - ".github/workflows/repro-homebrew-render.yml"

jobs:
  repro-homebrew-render:
    name: Repro Homebrew render (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151

      - name: Render Brewfile from home source (CI env)
        env:
          CI: "1"
          HOMEBREW_CI: "1"
        run: |
          chezmoi -S "$GITHUB_WORKSPACE/home" execute-template --file "$GITHUB_WORKSPACE/home/Brewfile.tmpl" > Brewfile.ci
          grep -E '^brew "neovim"' Brewfile.ci

      - name: Render bootstrap script and assert embedded neovim entry
        env:
          CI: "1"
          HOMEBREW_CI: "1"
        run: |
          chezmoi -S "$GITHUB_WORKSPACE/home" execute-template --init --file "$GITHUB_WORKSPACE/home/.chezmoiscripts/run_onchange_after_bootstrap.sh.tmpl" > bootstrap.ci.sh
          grep -E 'DOTFILES_BREWFILE_RENDERED' bootstrap.ci.sh
          grep -E '^brew "neovim"' bootstrap.ci.sh
