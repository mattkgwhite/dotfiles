---
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: null

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0

  # --- Build and attest container image (reusable workflow for SLSA L3) ---

  build:
    if: needs.release-please.outputs.release_created == 'true'
    needs: [release-please]
    uses: ./.github/workflows/_build-container.yml
    with:
      image_registry: ghcr.io
      image_name: ${{ github.repository }}
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  # --- Upload and attest install scripts (reusable workflow for SLSA L3) ---

  upload-scripts:
    if: needs.release-please.outputs.release_created == 'true'
    needs: [release-please]
    uses: ./.github/workflows/_upload-scripts.yml
    with:
      image_registry: ghcr.io
      image_name: ${{ github.repository }}
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
      id-token: write
      attestations: write
