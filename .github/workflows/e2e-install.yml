---
name: E2E install

on:
  pull_request:
    branches: [main]
    paths:
      - "install.sh.tmpl"
      - "install.ps1.tmpl"
      - "home/.chezmoi.toml.tmpl"
      - "home/.chezmoiscripts/**"
      - "home/.chezmoidata/**"
      - "home/.chezmoitemplates/**"
      - "home/dot_config/wakatime/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e-install.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-linux:
    name: E2E install (Linux)
    runs-on: ubuntu-24.04
    services:
      vaultwarden:
        image: vaultwarden/server:latest
        ports:
          - 8222:80
        env:
          SIGNUPS_ALLOWED: "true"
          DOMAIN: "http://localhost:8222"
          LOG_LEVEL: "warn"
          I_REALLY_WANT_VOLATILE_STORAGE: "true"
        options: >-
          --health-cmd "curl -sf http://localhost:80/alive || exit 1"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      BW_SERVER: "http://localhost:8222"
      BW_EMAIL: "ci-test@dotfiles.local"
      BW_PASSWORD: "CiTestPassword123!"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true

      - name: Register test user on Vaultwarden
        run: |
          uv run --script tests/e2e/seed-vaultwarden.py \
            "$BW_SERVER" "$BW_EMAIL" "$BW_PASSWORD" '[]'

      - name: Configure and login to Bitwarden
        run: |
          bw logout || true
          bw config server "$BW_SERVER"
          BW_SESSION=$(bw login "$BW_EMAIL" "$BW_PASSWORD" --raw)
          bw sync --session "$BW_SESSION" >/dev/null
          echo "BW_SESSION=$BW_SESSION" >> "$GITHUB_ENV"

      - name: Seed Bitwarden vault with test items
        run: |
          echo '{"type":1,"name":"wakatime-api-key","login":{"username":"","password":"test-wakatime-key-12345"}}' \
            | bw encode | bw create item --session "$BW_SESSION" >/dev/null

          echo '{"type":1,"name":"work-domain","login":{"username":"test.example.com","password":""}}' \
            | bw encode | bw create item --session "$BW_SESSION" >/dev/null

      - name: Link checkout as default chezmoi source
        run: |
          mkdir -p ~/.local/share
          ln -s "$GITHUB_WORKSPACE" ~/.local/share/chezmoi

      - name: Render install.sh from template
        env:
          DOTFILES_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          DOTFILES_IMAGE_NAME: "unused"
          DOTFILES_ATTESTATION_REPO: ${{ github.repository }}
          DOTFILES_RELEASE_TAG: "e2e-test"
        run: |
          chezmoi execute-template --file install.sh.tmpl > install.sh
          chezmoi -S "$GITHUB_WORKSPACE/home" execute-template --file "$GITHUB_WORKSPACE/home/Brewfile.tmpl" > Brewfile.e2e
          grep -E '^brew "neovim"' Brewfile.e2e
          chmod +x install.sh

      - name: Run install.sh
        env:
          CI: "1"
          HOMEBREW_CI: "1"
          DOTFILES_CHEZMOI_EXCLUDE: externals
          DOTFILES_BREWFILE_RENDERED: ${{ github.workspace }}/Brewfile.e2e
        run: ./install.sh

      - name: Verify E2E results
        run: bats tests/e2e/install.bats

  e2e-windows:
    name: E2E install (Windows)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true

      - name: Render install.ps1 from template
        env:
          DOTFILES_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          DOTFILES_IMAGE_NAME: "unused"
          DOTFILES_ATTESTATION_REPO: ${{ github.repository }}
          DOTFILES_RELEASE_TAG: "e2e-test"
        shell: pwsh
        run: |
          chezmoi -S "$env:GITHUB_WORKSPACE" execute-template --file install.ps1.tmpl | Out-File install.ps1 -Encoding ascii

      - name: Run install.ps1
        env:
          DOTFILES_SKIP_BITWARDEN: "1"
          DOTFILES_CHEZMOI_EXCLUDE: externals
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\install.ps1

      - name: Verify Windows E2E results
        shell: pwsh
        run: |
          $managed = chezmoi managed
          if (-not ($managed | Select-String -Pattern '\.config[\\/]+nvim[\\/]+init\.lua')) { throw "Neovim target is not managed by chezmoi" }
          if (-not ($managed | Select-String -Pattern '\.config[\\/]+wezterm[\\/]+wezterm\.lua')) { throw "WezTerm target is not managed by chezmoi" }
          if (-not (Get-Command chezmoi -ErrorAction SilentlyContinue)) { throw "chezmoi not found on PATH" }

  e2e-macos:
    name: E2E install (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true

      - name: Render install.sh from template
        env:
          DOTFILES_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          DOTFILES_IMAGE_NAME: "unused"
          DOTFILES_ATTESTATION_REPO: ${{ github.repository }}
          DOTFILES_RELEASE_TAG: "e2e-test"
        run: |
          chezmoi -S "$GITHUB_WORKSPACE" execute-template --file install.sh.tmpl > install.sh
          chezmoi -S "$GITHUB_WORKSPACE/home" execute-template --file "$GITHUB_WORKSPACE/home/Brewfile.tmpl" > Brewfile.e2e
          grep -E '^brew "neovim"' Brewfile.e2e
          chmod +x install.sh

      - name: Run install.sh
        env:
          CI: "1"
          HOMEBREW_CI: "1"
          DOTFILES_SKIP_BITWARDEN: "1"
          DOTFILES_CHEZMOI_EXCLUDE: externals
          DOTFILES_BREWFILE_RENDERED: ${{ github.workspace }}/Brewfile.e2e
        run: ./install.sh

      - name: Verify macOS E2E results
        run: |
          test -f "$HOME/.gitconfig"
          test -f "$HOME/.config/nvim/init.lua"
          command -v tmux
