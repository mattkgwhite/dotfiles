---
name: Build and attest container image

on:
  workflow_call:
    inputs:
      image_registry:
        required: true
        type: string
      image_name:
        required: true
        type: string
      tag_name:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        id: image
        run: |
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ inputs.image_registry }}/${{ inputs.image_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.image_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.5

      - name: Build full image locally
        run: |
          docker build -t dotfiles-full:local .

      - name: Extract delta layers and push
        id: push
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image.outputs.name }}"
          TAG="${{ inputs.tag_name }}"
          BASE_IMAGE="mcr.microsoft.com/devcontainers/universal:latest"

          # Count base vs full layers to find our diff
          base_count=$(docker inspect --format='{{range .RootFS.Layers}}x{{end}}' "$BASE_IMAGE" | wc -c)
          base_count=$((base_count - 1))
          full_count=$(docker inspect --format='{{range .RootFS.Layers}}x{{end}}' dotfiles-full:local | wc -c)
          full_count=$((full_count - 1))
          diff_count=$((full_count - base_count))

          echo "Base layers: $base_count, Full layers: $full_count, Our layers: $diff_count"

          if [ "$diff_count" -le 0 ]; then
            echo "::error::No diff layers found"
            exit 1
          fi

          # docker save and extract only our layer tarballs
          work="$(mktemp -d)"
          docker save dotfiles-full:local -o "$work/full.tar"
          tar xf "$work/full.tar" -C "$work" manifest.json

          layer_paths=$(jq -r '.[0].Layers[]' "$work/manifest.json")
          our_layers=$(echo "$layer_paths" | tail -n "$diff_count")

          append_args=""
          for lp in $our_layers; do
            tar xf "$work/full.tar" -C "$work" "$lp"
            size=$(du -h "$work/$lp" | cut -f1)
            echo "  Extracted layer: $lp ($size)"
            append_args="$append_args -f $work/$lp"
          done

          # Push delta image (scratch + our layers) to GHCR
          # shellcheck disable=SC2086
          crane append $append_args -t "$IMAGE:$TAG"

          # Add :latest tag
          crane tag "$IMAGE:$TAG" latest

          # Capture digest for attestation
          digest=$(crane digest "$IMAGE:$TAG")
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE:$TAG with digest $digest"

          # Show final image info
          echo "Delta image layers:"
          crane manifest "$IMAGE:$TAG" | jq '.layers[] | {digest, size}'
          echo "Total size:"
          crane manifest "$IMAGE:$TAG" | jq '[.layers[].size] | add' | numfmt --to=iec-i --suffix=B

          rm -rf "$work"

      - name: Attest container provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
