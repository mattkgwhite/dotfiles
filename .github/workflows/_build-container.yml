---
name: Build and attest container image

on:
  workflow_call:
    inputs:
      image_registry:
        required: true
        type: string
      image_name:
        required: true
        type: string
      tag_name:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lowercase image name
        id: image
        run: |
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ inputs.image_registry }}/${{ inputs.image_name }}

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ inputs.image_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up crane
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Build full image locally
        run: |
          docker build -t dotfiles-full:local .

      - name: Extract delta layers and push
        id: push
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image.outputs.name }}"
          TAG="${{ inputs.tag_name }}"

          # The Dockerfile adds exactly 2 layers on top of the base:
          #   1. COPY (dotfiles source)
          #   2. RUN  (install.sh + cleanup)
          # Keep in sync with the Dockerfile instruction count after FROM.
          DIFF_COUNT=2

          # docker save and extract only our layer tarballs
          work="$(mktemp -d)"
          docker save dotfiles-full:local -o "$work/full.tar"
          tar xf "$work/full.tar" -C "$work" manifest.json

          total=$(jq -r '.[0].Layers | length' "$work/manifest.json")
          echo "Total layers: $total, Our layers: $DIFF_COUNT"

          layer_paths=$(jq -r '.[0].Layers[]' "$work/manifest.json")
          our_layers=$(echo "$layer_paths" | tail -n "$DIFF_COUNT")

          append_args=""
          for lp in $our_layers; do
            tar xf "$work/full.tar" -C "$work" "$lp"
            size=$(du -h "$work/$lp" | cut -f1)
            echo "  Extracted layer: $lp ($size)"
            append_args="$append_args -f $work/$lp"
          done

          # Push delta image (scratch + our layers) to GHCR
          # shellcheck disable=SC2086
          crane append $append_args -t "$IMAGE:$TAG"

          # Add :latest tag
          crane tag "$IMAGE:$TAG" latest

          # Capture digest for attestation
          digest=$(crane digest "$IMAGE:$TAG")
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE:$TAG with digest $digest"

          # Show final image info
          echo "Delta image layers:"
          crane manifest "$IMAGE:$TAG" | jq '.layers[] | {digest, size}'
          echo "Total size:"
          crane manifest "$IMAGE:$TAG" | jq '[.layers[].size] | add' | numfmt --to=iec-i --suffix=B

          rm -rf "$work"

      - name: Attest container provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
