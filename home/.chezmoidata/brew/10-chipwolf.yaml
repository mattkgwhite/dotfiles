# yaml-language-server: $schema=../../../schemas/brew-overlays.schema.json
brew:
  overlays:
    chipwolf:
      conditions:
        - { kind: env, name: CI, op: unset }
      packages:
        - type: brew
          name: asitop # apple silicon top
          conditions:
            - { kind: os, op: is, value: mac }
        - type: brew
          name: aws-vault
          conditions:
            - { kind: env, name: CODESPACES, op: unset }
        - type: brew
          name: awscli
          conditions:
            - { kind: env, name: CODESPACES, op: unset }
        - type: brew
          name: bitwarden-cli
          conditions:
            - { kind: env, name: CODESPACES, op: unset }
        - type: brew
          name: blueutil
          conditions:
            - { kind: os, op: is, value: mac }
        - type: brew
          name: btop
          conditions:
            - { kind: env, name: CODESPACES, op: unset }
        - type: brew
          name: cbonsai
          conditions:
            - { kind: env, name: CODESPACES, op: unset }
            - { kind: env, name: PRIVATE, op: set }
        - type: brew
          name: thefuck
          conditions:
            - { kind: env, name: CODESPACES, op: unset }

        - type: cask
          name: eqmac
          conditions:
            - { kind: os, op: is, value: mac }
        - type: cask
          name: finicky
          conditions:
            - { kind: os, op: is, value: mac }
        - type: cask
          name: gcloud-cli
          conditions:
            - { kind: os, op: is, value: mac }
        - type: cask
          name: lookaway # screen breaks
          conditions:
            - { kind: os, op: is, value: mac }

