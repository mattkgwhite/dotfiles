# yaml-language-server: $schema=../../schemas/mcp-servers.schema.json
mcpServers:
  - id: atlassian
    enabled: true
    conditions:
      requirePrivateFalse: true
    targets:
      opencode:
        enabled: true
      cursor:
        enabled: true
    remote:
      url: "https://mcp.atlassian.com/v1/mcp"

  - id: mcp-atlassian
    enabled: true
    conditions:
      requirePrivateFalse: true
    targets:
      opencode:
        enabled: true
      cursor:
        enabled: false
    local:
      command: "bash"
      args:
        - "-c"
        - "set -a; source ~/.config/opencode/mcp-atlassian.env; set +a; exec mise x python -- uvx mcp-atlassian==0.20.1"
      env: {}

  - id: obsidian
    enabled: true
    targets:
      opencode:
        enabled: true
      cursor:
        enabled: true
    local:
      command: "mise"
      args:
        - "x"
        - "node@22"
        - "--"
        - "npx"
        - "-y"
        - "@mauricio.wolff/mcp-obsidian@0.8.1"
      appendVaultPath: true
      env: {}

  - id: chrome-devtools
    enabled: true
    targets:
      opencode:
        enabled: true
      cursor:
        enabled: true
    local:
      command: "mise"
      args:
        - "x"
        - "node@22"
        - "--"
        - "npx"
        - "-y"
        - "chrome-devtools-mcp@0.21.0"
      env: {}

  - id: context7
    enabled: true
    targets:
      opencode:
        enabled: true
      cursor:
        enabled: true
    remote:
      url: "https://mcp.context7.com/mcp"

  - id: grep
    enabled: true
    targets:
      opencode:
        enabled: true
      cursor:
        enabled: true
    remote:
      url: "https://mcp.grep.app"
