mcpServers:
  - id: atlassian
    enabled: true
    conditions:
      requirePrivateFalse: true
    targets:
      opencode: true
      cursor: true
    remote:
      url: "https://mcp.atlassian.com/v1/mcp"
    cursorRemote:
      transport: "streamableHttp"
      url: "https://mcp.atlassian.com/v1/mcp"
      headers: {}

  - id: mcp-atlassian
    enabled: true
    conditions:
      requirePrivateFalse: true
    targets:
      opencode: true
      cursor: false
    local:
      command:
        - "bash"
        - "-c"
        - "set -a; source ~/.config/opencode/mcp-atlassian.env; set +a; exec mise x python -- uvx mcp-atlassian"
      env: {}

  - id: obsidian
    enabled: true
    targets:
      opencode: true
      cursor: true
    local:
      command:
        - "mise"
        - "x"
        - "node"
        - "--"
        - "npx"
        - "-y"
        - "@mauricio.wolff/mcp-obsidian@latest"
      appendVaultPath: true
      env: {}
    cursorLocal:
      command: "mise"
      args:
        - "x"
        - "node"
        - "--"
        - "npx"
        - "-y"
        - "@mauricio.wolff/mcp-obsidian@latest"
      appendVaultPath: true
      env: {}

  - id: chrome-devtools
    enabled: true
    targets:
      opencode: true
      cursor: true
    local:
      command:
        - "mise"
        - "x"
        - "node"
        - "--"
        - "npx"
        - "-y"
        - "chrome-devtools-mcp@latest"
      env: {}
    cursorLocal:
      command: "mise"
      args:
        - "x"
        - "node@22"
        - "--"
        - "npx"
        - "-y"
        - "chrome-devtools-mcp@latest"
      env: {}

  - id: context7
    enabled: true
    targets:
      opencode: true
      cursor: true
    remote:
      url: "https://mcp.context7.com/mcp"
    cursorRemote:
      transport: "streamableHttp"
      url: "https://mcp.context7.com/mcp"
      headers: {}

  - id: grep
    enabled: true
    targets:
      opencode: true
      cursor: true
    remote:
      url: "https://mcp.grep.app"
    cursorRemote:
      transport: "streamableHttp"
      url: "https://mcp.grep.app"
      headers: {}
