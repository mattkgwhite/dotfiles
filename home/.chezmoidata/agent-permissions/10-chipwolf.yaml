---
# yaml-language-server: $schema=../../../schemas/agent-permissions.schema.json
agentPermissions:
  ruleSets:
    chipwolf:
      conditions:
        ci: false
      rules:
        - kind: permission_key
          pattern: "atlassian_*"
          op: ask
          conditions:
            private: false
        - kind: permission_key
          pattern: "mcp-atlassian_*"
          op: ask
          conditions:
            private: false
        - kind: permission_key
          pattern: "atlassian_get*"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "atlassian_search*"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "atlassian_atlassianUserInfo"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "atlassian_fetch"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "atlassian_lookupJiraAccountId"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "mcp-atlassian_jira_get_*"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "mcp-atlassian_jira_search*"
          op: allow
          conditions:
            private: false
        - kind: permission_key
          pattern: "mcp-atlassian_jira_batch_get_changelogs"
          op: allow
          conditions:
            private: false
