default: true

# MD003: Heading style
# Use consistent style per file (don't enforce a global style)
MD003:
  style: consistent

# MD013: Line length
# Reference docs (AGENTS.md, skill files) have intentionally long lines
MD013: false

# MD024: Duplicate heading
# CHANGELOG.md has repeated version headings by design (auto-generated)
# Allow siblings (same level, different parent context) to have duplicate names
MD024:
  siblings_only: true

# MD033: Inline HTML
# README.md uses <a> anchor tags for inspect-first links
MD033: false

# MD034: Bare URL
# Disabled globally — skill files use bare URLs in prose
MD034: false

# MD036: Emphasis as heading
# "**macOS / Linux**" bold text used as a section label, not a heading
MD036: false

# MD041: First line should be a top level heading
# OpenCode skill/agent files use YAML frontmatter with description field
MD041:
  front_matter_title: "^\\s*description\\s*:"

# MD042: Empty links
# Badge images intentionally use (#) as a no-op anchor
MD042: false

# MD060: Table column style
# Tables with unicode characters (arrows, em-dashes) cannot satisfy byte-aligned pipe rules
MD060: false
